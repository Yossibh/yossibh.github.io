<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T-Rex Runner · Games</title>
  <meta name="description" content="Browser clone of the Chrome offline T-Rex jumping game." />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/games/games.css" />
</head>
<body>
  <main class="wrap">
    <p class="crumbs"><a href="/">/</a> / <a href="/games/">games</a> / dino</p>
    <div class="game-head">
      <h1><span class="accent">T-Rex</span> Runner</h1>
      <div class="score mono">score <strong id="score">0</strong> · best <strong id="best">0</strong></div>
    </div>
    <p class="controls">
      <span><kbd>space</kbd> / <kbd>↑</kbd> / tap - jump</span>
      <span><kbd>↓</kbd> - duck</span>
      <span><kbd>R</kbd> - restart</span>
      <span id="sfx-slot"></span>
    </p>
    <canvas id="game" width="800" height="240" aria-label="T-Rex runner game canvas"></canvas>
  </main>

<script src="/games/sfx.js"></script>

<script>
(function () {
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var GROUND_Y = H - 30;

  var state = {
    t: 0,
    speed: 5,
    running: true,
    over: false,
    score: 0,
    best: parseInt(localStorage.getItem('dino-best') || '0', 10),
    dino: { x: 60, y: GROUND_Y, vy: 0, w: 28, h: 32, ducking: false },
    obstacles: [],
    clouds: [],
    groundOffset: 0,
    spawnCooldown: 60,
  };

  document.getElementById('best').textContent = state.best;

  var G = 0.6;
  var JUMP_V = -11;

  function reset() {
    state.t = 0;
    state.speed = 5;
    state.over = false;
    state.running = true;
    state.score = 0;
    state.dino.y = GROUND_Y; state.dino.vy = 0; state.dino.ducking = false;
    state.obstacles.length = 0;
    state.clouds.length = 0;
    state.spawnCooldown = 60;
  }

  function jump() {
    if (state.over) { reset(); return; }
    if (state.dino.y >= GROUND_Y - 1) {
      state.dino.vy = JUMP_V;
      SFX.jump();
    }
  }
  function duck(on) { state.dino.ducking = !!on; }

  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
    else if (e.code === 'ArrowDown') { e.preventDefault(); duck(true); }
    else if (e.key === 'r' || e.key === 'R') { reset(); }
  });
  window.addEventListener('keyup', function (e) {
    if (e.code === 'ArrowDown') { duck(false); }
  });
  canvas.addEventListener('pointerdown', function (e) { e.preventDefault(); jump(); });

  function rand(min, max) { return min + Math.random() * (max - min); }

  function spawnObstacle() {
    // Mix of small cactus, big cactus, and (rarely) a bird.
    var roll = Math.random();
    if (roll < 0.15 && state.score > 100) {
      // bird at duckable height
      state.obstacles.push({ type: 'bird', x: W + 10, y: GROUND_Y - 38, w: 30, h: 18, flap: 0 });
    } else if (roll < 0.55) {
      state.obstacles.push({ type: 'cactus-s', x: W + 10, y: GROUND_Y - 24, w: 14, h: 24 });
    } else {
      state.obstacles.push({ type: 'cactus-l', x: W + 10, y: GROUND_Y - 34, w: 18, h: 34 });
    }
  }

  function spawnCloud() {
    state.clouds.push({ x: W + 20, y: rand(20, 80), speed: rand(0.5, 1.2) });
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function step() {
    if (!state.running) return;
    state.t++;
    state.score = Math.floor(state.t / 5);
    state.speed = Math.min(14, 5 + state.score * 0.004);

    // Dino physics
    var d = state.dino;
    d.vy += G;
    d.y += d.vy;
    if (d.y > GROUND_Y) { d.y = GROUND_Y; d.vy = 0; }
    var dh = d.ducking && d.y === GROUND_Y ? 20 : 32;
    var dy = d.ducking && d.y === GROUND_Y ? GROUND_Y - 20 : d.y - 32;
    var dBox = { x: d.x, y: dy, w: d.w + (d.ducking && d.y === GROUND_Y ? 10 : 0), h: dh };

    // Obstacles
    state.spawnCooldown--;
    if (state.spawnCooldown <= 0) {
      spawnObstacle();
      state.spawnCooldown = Math.max(28, 70 - state.score * 0.03 + Math.random() * 40);
    }
    for (var i = state.obstacles.length - 1; i >= 0; i--) {
      var o = state.obstacles[i];
      o.x -= state.speed;
      if (o.type === 'bird') { o.flap = (o.flap + 1) % 20; }
      if (o.x + o.w < 0) state.obstacles.splice(i, 1);
      else if (rectsOverlap(dBox, o)) { gameOver(); return; }
    }
    // Clouds
    if (Math.random() < 0.01) spawnCloud();
    for (var j = state.clouds.length - 1; j >= 0; j--) {
      state.clouds[j].x -= state.clouds[j].speed;
      if (state.clouds[j].x < -30) state.clouds.splice(j, 1);
    }
    state.groundOffset = (state.groundOffset + state.speed) % 20;
  }

  function gameOver() {
    state.over = true;
    state.running = false;
    SFX.crash();
    if (state.score > state.best) {
      state.best = state.score;
      localStorage.setItem('dino-best', String(state.best));
    }
  }

  function drawDino() {
    var d = state.dino;
    ctx.fillStyle = '#d7e1ea';
    if (d.ducking && d.y === GROUND_Y) {
      ctx.fillRect(d.x, GROUND_Y - 20, d.w + 10, 20);
      // Eye
      ctx.fillStyle = '#0a0e12';
      ctx.fillRect(d.x + d.w + 4, GROUND_Y - 17, 2, 2);
    } else {
      ctx.fillRect(d.x, d.y - 32, d.w, 32);
      // Eye
      ctx.fillStyle = '#0a0e12';
      ctx.fillRect(d.x + 22, d.y - 28, 2, 2);
      // Legs (simple alternating)
      ctx.fillStyle = '#d7e1ea';
      if (d.y === GROUND_Y) {
        var leg = (state.t >> 2) % 2;
        if (leg === 0) { ctx.fillRect(d.x + 4, d.y - 4, 6, 4); }
        else { ctx.fillRect(d.x + 16, d.y - 4, 6, 4); }
      }
    }
  }

  function drawObstacle(o) {
    ctx.fillStyle = '#5cd2a3';
    if (o.type === 'bird') {
      // Body
      ctx.fillRect(o.x, o.y, o.w, o.h - 6);
      // Wings flap
      var up = o.flap < 10;
      if (up) ctx.fillRect(o.x + 4, o.y - 6, 20, 6);
      else    ctx.fillRect(o.x + 4, o.y + o.h - 2, 20, 6);
    } else {
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillRect(o.x - 4, o.y + 8, 4, 10);
      ctx.fillRect(o.x + o.w, o.y + 12, 4, 10);
    }
  }

  function drawCloud(c) {
    ctx.fillStyle = '#1f2a36';
    ctx.fillRect(c.x, c.y, 24, 6);
    ctx.fillRect(c.x + 4, c.y - 4, 16, 4);
  }

  function drawGround() {
    ctx.strokeStyle = '#1f2a36';
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y + 0.5);
    ctx.lineTo(W, GROUND_Y + 0.5);
    ctx.stroke();
    ctx.fillStyle = '#1f2a36';
    for (var x = -state.groundOffset; x < W; x += 20) {
      ctx.fillRect(x, GROUND_Y + 4, 8, 2);
    }
  }

  function render() {
    ctx.fillStyle = '#0a0e12';
    ctx.fillRect(0, 0, W, H);
    state.clouds.forEach(drawCloud);
    drawGround();
    state.obstacles.forEach(drawObstacle);
    drawDino();

    if (state.over) {
      ctx.fillStyle = '#ff7878';
      ctx.font = '700 22px ui-monospace, Menlo, Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('G A M E   O V E R', W / 2, H / 2 - 4);
      ctx.fillStyle = '#8a99a8';
      ctx.font = '400 12px ui-monospace, Menlo, Consolas, monospace';
      ctx.fillText('press space or R to restart', W / 2, H / 2 + 16);
    }
    document.getElementById('score').textContent = state.score;
    document.getElementById('best').textContent = state.best;
  }

  function loop() {
    step();
    render();
    requestAnimationFrame(loop);
  }
  loop();
  SFX.mountToggle(document.getElementById('sfx-slot'));
})();
</script>
</body>
</html>
